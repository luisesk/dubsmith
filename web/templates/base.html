<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Dubsmith{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@500;700&family=Geist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/tokens.css">
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<script>
(function(){
  const t = localStorage.getItem('theme') || 'dark';
  const d = localStorage.getItem('density') || 'comfortable';
  document.documentElement.setAttribute('data-theme', t);
  document.documentElement.setAttribute('data-density', d);
})();
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('theme-icon').innerHTML = next === 'dark' ? icons.moon : icons.sun;
}
function toggleDensity() {
  const cur = document.documentElement.getAttribute('data-density') || 'comfortable';
  const next = cur === 'compact' ? 'comfortable' : 'compact';
  document.documentElement.setAttribute('data-density', next);
  localStorage.setItem('density', next);
}
function toggleSidebar() {
  document.body.classList.toggle('sb-open');
}
// close sidebar after nav click on mobile
document.addEventListener('click', (e) => {
  if (window.innerWidth >= 769) return;
  const a = e.target.closest('.sidebar a');
  if (a) document.body.classList.remove('sb-open');
});
const icons = {
  grid:   '<svg viewBox="0 0 24 24" width="14" height="14" fill="none"><rect x="4" y="4" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="13" y="4" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="4" y="13" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="13" y="13" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/></svg>',
  folder: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z" stroke="currentColor" stroke-width="1.6"/></svg>',
  search: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none"><circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.6"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>',
  refresh:'<svg viewBox="0 0 24 24" width="14" height="14" fill="none"><path d="M4 12a8 8 0 0 1 14-5.3M20 12a8 8 0 0 1-14 5.3M18 3v4h-4M6 21v-4h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  settings:'<svg viewBox="0 0 24 24" width="14" height="14" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M4.9 19.1l2.1-2.1M17 7l2.1-2.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>',
  film:   '<svg viewBox="0 0 24 24" width="14" height="14" fill="none"><rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 10h18M3 14h18M7 4v16M17 4v16" stroke="currentColor" stroke-width="1.4"/></svg>',
  list:   '<svg viewBox="0 0 24 24" width="14" height="14" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
  logo:   '<svg viewBox="0 0 24 24" width="18" height="18" fill="none"><g stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="8" y1="9" x2="8" y2="11"/><line x1="10" y1="6.5" x2="10" y2="11"/><line x1="12" y1="4" x2="12" y2="11"/><line x1="14" y1="6" x2="14" y2="11"/><line x1="16" y1="8" x2="16" y2="11"/></g><path d="M5 12h12a2 2 0 0 1 2 2v0H5z" fill="currentColor"/><path d="M9 14v3M15 14v3M7 17h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
  bell:   '<svg viewBox="0 0 24 24" width="14" height="14" fill="none"><path d="M6 9a6 6 0 0 1 12 0v4l1.5 3h-15L6 13z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 19a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.5"/></svg>',
  moon:   '<svg viewBox="0 0 24 24" width="14" height="14" fill="none"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>',
  sun:    '<svg viewBox="0 0 24 24" width="14" height="14" fill="none"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.6"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M5 19l1.5-1.5M17.5 6.5 19 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>',
  chevR:  '<svg viewBox="0 0 24 24" width="12" height="12" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
};
</script>
<body>
<div id="toast-host" style="position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:9999;pointer-events:none;"></div>
<script>
// Preserve scroll position across page reloads (for any reload that follows a button click)
(function() {
  // Restore on load
  const sp = sessionStorage.getItem('scroll:' + location.pathname);
  if (sp != null) {
    requestAnimationFrame(() => { window.scrollTo(0, parseInt(sp, 10) || 0); });
  }
  // Save before reload
  window.addEventListener('beforeunload', () => {
    sessionStorage.setItem('scroll:' + location.pathname, String(window.scrollY));
  });
})();
function softReload() {
  sessionStorage.setItem('scroll:' + location.pathname, String(window.scrollY));
  location.reload();
}
function toast(msg, kind) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `padding:10px 14px;border-radius:8px;font-size:12px;font-weight:600;
    background:${kind==='err'?'var(--af-danger)':'var(--af-accent)'};color:#fff;
    box-shadow:var(--af-shadow-md);transform:translateY(8px);opacity:0;transition:.25s;pointer-events:auto;`;
  document.getElementById('toast-host').appendChild(t);
  requestAnimationFrame(()=>{ t.style.transform='translateY(0)'; t.style.opacity='1'; });
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateY(8px)'; setTimeout(()=>t.remove(), 300); }, 2200);
}
</script>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"><span id="brand-logo"></span></div>
      <div>
        <div class="brand-name">Dubsmith</div>
        <div class="brand-ver">v{{ app_version }}</div>
      </div>
    </div>
    <div class="section-label">Workspace</div>
    <nav class="nav">
      <a href="/" class="nav-item {% if active=='home' %}active{% endif %}">
        <span class="icon" id="i-home"></span>
        <span style="flex:1">Dashboard</span>
      </a>
      <a href="/library" class="nav-item {% if active=='library' %}active{% endif %}">
        <span class="icon" id="i-lib"></span>
        <span style="flex:1">Library</span>
      </a>
      <a href="/shows" class="nav-item {% if active=='shows' %}active{% endif %}">
        <span class="icon" id="i-shows"></span>
        <span style="flex:1">Shows</span>
      </a>
      <a href="/queue-page" class="nav-item {% if active=='queue' %}active{% endif %}">
        <span class="icon" id="i-queue"></span>
        <span style="flex:1">Job queue</span>
        <span class="nav-count" id="queue-count">0</span>
      </a>
      <a href="/logs" class="nav-item {% if active=='logs' %}active{% endif %}">
        <span class="icon" id="i-logs"></span>
        <span style="flex:1">Logs</span>
      </a>
      <a href="/settings" class="nav-item {% if active=='settings' %}active{% endif %}">
        <span class="icon" id="i-settings"></span>
        <span style="flex:1">Settings</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="/profile" style="padding:8px 10px;color:var(--af-text-mute);text-decoration:none;font-size:12px;border-radius:6px;display:flex;align-items:center;gap:8px;" onmouseover="this.style.background='var(--af-bg-hover)';" onmouseout="this.style.background='';">
        ◌ My profile
      </a>
      <a href="/logout" style="padding:8px 10px;color:var(--af-text-mute);text-decoration:none;font-size:12px;border-radius:6px;display:flex;align-items:center;gap:8px;" onmouseover="this.style.background='var(--af-bg-hover)';" onmouseout="this.style.background='';">
        ↩ Sign out
      </a>
      <div class="lib-card">
        <div style="display:flex;align-items:center;gap:6px;font-size:10px;color:var(--af-text-dim);text-transform:uppercase;letter-spacing:.1em;font-family:var(--af-font-mono);">
          <span id="i-libpath"></span> Library path
        </div>
        <div style="margin-top:6px;font-size:11px;font-family:var(--af-font-mono);word-break:break-all;">/library/Videos/Animes</div>
        <div style="margin-top:6px;font-size:10px;color:var(--af-text-mute);display:flex;justify-content:space-between;">
          <span>via NFS</span><span>BlackPool</span>
        </div>
      </div>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="icon-btn nav-toggle" onclick="toggleSidebar()" title="Menu" aria-label="Menu">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="crumbs">
        <strong>{{ page_title or "plex-dub" }}</strong>
      </div>
      <div class="topbar-actions">
        <div class="live-pill">CRUNCHYROLL · ONLINE</div>
        <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme"><span id="theme-icon"></span></button>
      </div>
    </div>
    <main class="page">
{% block body %}{% endblock %}
    </main>
  </div>
</div>
<script>
// Inject SVG icons
document.getElementById('brand-logo').innerHTML = icons.logo;
document.getElementById('i-home').innerHTML = icons.grid;
document.getElementById('i-lib').innerHTML = icons.folder;
document.getElementById('i-shows').innerHTML = icons.film;
document.getElementById('i-queue').innerHTML = icons.refresh;
document.getElementById('i-logs').innerHTML = icons.list;
document.getElementById('i-settings').innerHTML = icons.settings;
document.getElementById('i-libpath').innerHTML = icons.folder;
const t = document.documentElement.getAttribute('data-theme') || 'dark';
document.getElementById('theme-icon').innerHTML = t === 'dark' ? icons.moon : icons.sun;

// Live queue count in sidebar
fetch('/api/metrics', {credentials:'same-origin'}).then(r=>r.json()).then(d=>{
  const n = (d.stats?.pending||0) + (d.stats?.downloading||0) + (d.stats?.syncing||0) + (d.stats?.muxing||0);
  document.getElementById('queue-count').textContent = n;
  document.getElementById('queue-count').classList.toggle('running', n > 0);
}).catch(()=>{});
</script>
</body>
</html>
